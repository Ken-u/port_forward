<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>端口转发管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1419; color: #e7e9ea; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
h1 { font-size: 1.6rem; margin-bottom: 8px; color: #fff; }
.subtitle { color: #71767b; margin-bottom: 24px; font-size: 0.9rem; }
.card { background: #1a1f25; border: 1px solid #2f3336; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 1.1rem; margin-bottom: 12px; color: #f0f0f0; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.online { background: #00ba7c; }
.status-dot.offline { background: #f4212e; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #2f3336; font-size: 0.9rem; }
th { color: #71767b; font-weight: 500; }
.btn { display: inline-block; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: #1d9bf0; color: #fff; }
.btn-primary:hover { background: #1a8cd8; }
.btn-danger { background: #f4212e; color: #fff; }
.btn-danger:hover { background: #dc1d28; }
.btn-sm { padding: 5px 10px; font-size: 0.8rem; }
.form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.form-row input, .form-row select { flex: 1; min-width: 100px; padding: 8px 12px; border-radius: 8px; border: 1px solid #2f3336; background: #0f1419; color: #e7e9ea; font-size: 0.85rem; }
.form-row input:focus, .form-row select:focus { outline: none; border-color: #1d9bf0; }
.empty { color: #71767b; text-align: center; padding: 20px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
.badge-green { background: rgba(0,186,124,0.15); color: #00ba7c; }
.badge-red { background: rgba(244,33,46,0.15); color: #f4212e; }
.badge-blue { background: rgba(29,155,240,0.15); color: #1d9bf0; }
</style>
</head>
<body>
<div class="container">
  <h1>端口转发管理</h1>
  <p class="subtitle">通过一个主端口转发多个 TCP 连接，无需改动 frp 配置</p>

  <div class="card">
    <h2>节点</h2>
    <table>
      <thead><tr><th>名称</th><th>地址</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="peers-table"><tr><td colspan="4" class="empty">暂无节点</td></tr></tbody>
    </table>
    <div class="form-row" style="margin-top:12px">
      <input id="peer-name" placeholder="节点名称">
      <input id="peer-addr" placeholder="地址 (host:port)">
      <button class="btn btn-primary" onclick="addPeer()">添加节点</button>
    </div>
  </div>

  <div class="card">
    <h2>转发规则</h2>
    <table>
      <thead><tr><th>名称</th><th>本地监听</th><th>目标地址</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="rules-table"><tr><td colspan="5" class="empty">暂无规则</td></tr></tbody>
    </table>
    <div class="form-row" style="margin-top:12px">
      <input id="rule-name" placeholder="名称" style="min-width:80px">
      <input id="rule-listen" placeholder="监听地址" value="127.0.0.1">
      <input id="rule-listen-port" placeholder="监听端口" type="number" style="max-width:100px">
      <input id="rule-target" placeholder="目标地址">
      <input id="rule-target-port" placeholder="目标端口" type="number" style="max-width:100px">
      <button class="btn btn-primary" onclick="addRule()">添加规则</button>
    </div>
  </div>

  <div class="card">
    <h2>Token 设置</h2>
    <div class="form-row">
      <input id="token-input" placeholder="鉴权 Token" type="password">
      <button class="btn btn-primary" onclick="saveToken()">保存</button>
    </div>
    <p style="margin-top:8px;color:#71767b;font-size:0.8rem;">两边节点需要使用相同的 Token 才能互连</p>
  </div>
</div>

<script>
const API = '';

async function fetchJSON(url, opts) {
  const r = await fetch(API + url, opts);
  return r.json();
}

async function refresh() {
  const status = await fetchJSON('/api/status');
  const peersT = document.getElementById('peers-table');
  const rulesT = document.getElementById('rules-table');

  if (status.peers && status.peers.length) {
    peersT.innerHTML = status.peers.map(p => `<tr>
      <td>${esc(p.name)}</td>
      <td><code>${esc(p.addr)}</code></td>
      <td><span class="status-dot ${p.connected?'online':'offline'}"></span>${p.connected?'<span class="badge badge-green">已连接</span>':'<span class="badge badge-red">未连接</span>'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delPeer('${esc(p.name)}')">删除</button></td>
    </tr>`).join('');
  } else {
    peersT.innerHTML = '<tr><td colspan="4" class="empty">暂无节点</td></tr>';
  }

  if (status.rules && status.rules.length) {
    rulesT.innerHTML = status.rules.map(r => `<tr>
      <td>${esc(r.name)}</td>
      <td><code>${esc(r.listen_addr)}:${r.listen_port}</code></td>
      <td><code>${esc(r.target_addr)}:${r.target_port}</code></td>
      <td>${r.listening?'<span class="badge badge-green">监听中</span>':'<span class="badge badge-blue">等待连接</span>'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delRule('${r.id}')">删除</button></td>
    </tr>`).join('');
  } else {
    rulesT.innerHTML = '<tr><td colspan="5" class="empty">暂无规则</td></tr>';
  }

  const cfg = await fetchJSON('/api/config');
  document.getElementById('token-input').value = cfg.token || '';
}

async function addPeer() {
  const name = document.getElementById('peer-name').value.trim();
  const addr = document.getElementById('peer-addr').value.trim();
  if (!name || !addr) return alert('请填写名称和地址');
  await fetchJSON('/api/peers', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, addr})});
  document.getElementById('peer-name').value = '';
  document.getElementById('peer-addr').value = '';
  refresh();
}

async function delPeer(name) {
  if (!confirm('确定删除节点 ' + name + '？')) return;
  await fetch('/api/peers/' + encodeURIComponent(name), {method:'DELETE'});
  refresh();
}

async function addRule() {
  const name = document.getElementById('rule-name').value.trim();
  const listen_addr = document.getElementById('rule-listen').value.trim();
  const listen_port = parseInt(document.getElementById('rule-listen-port').value);
  const target_addr = document.getElementById('rule-target').value.trim();
  const target_port = parseInt(document.getElementById('rule-target-port').value);
  if (!listen_port || !target_addr || !target_port) return alert('请填写完整');
  await fetchJSON('/api/rules', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
    name: name || `${listen_port}->${target_port}`,
    listen_addr: listen_addr || '127.0.0.1',
    listen_port, target_addr, target_port,
    direction: 'local', enabled: true
  })});
  document.getElementById('rule-name').value = '';
  document.getElementById('rule-listen-port').value = '';
  document.getElementById('rule-target').value = '';
  document.getElementById('rule-target-port').value = '';
  refresh();
}

async function delRule(id) {
  if (!confirm('确定删除规则？')) return;
  await fetch('/api/rules/' + id, {method:'DELETE'});
  refresh();
}

async function saveToken() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return alert('Token 不能为空');
  await fetchJSON('/api/config', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token})});
  alert('已保存');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
